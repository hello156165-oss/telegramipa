name: Build Telegram IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone Telegram-iOS
        run: |
          set -euxo pipefail
          git clone --recursive -j8 https://github.com/TelegramMessenger/Telegram-iOS.git telegram-src
          cd telegram-src
          # Pin to a known-good revision that builds on GitHub runners (Xcode 15.x).
          git -c submodule.recurse=false checkout 7504a0f92694a3ccbb544e05f97304f8d0891ba9
          git submodule update --init --recursive -j8

      - name: Patch Make.py for CI (TrollStore/unsigned)
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          
          p = Path("telegram-src/build-system/Make/Make.py")
          s = p.read_text(encoding="utf-8")
          
          # 1) Allow --bazelArguments after subcommand (argparse normalization)
          if "Normalize argv by" not in s and "args = parser.parse_args()" in s:
              s = s.replace(
                  "    args = parser.parse_args()\n",
                  "    # argparse requires global options to appear before the subcommand.\n"
                  "    # Some callers (e.g. CI YAML) append `--bazelArguments` after the subcommand,\n"
                  "    # which would normally fail with \"unrecognized arguments\". Normalize argv by\n"
                  "    # moving `--bazelArguments` (and its value) before the subcommand.\n"
                  "    argv = list(sys.argv[1:])\n"
                  "    if '--bazelArguments' in argv:\n"
                  "        idx = argv.index('--bazelArguments')\n"
                  "        if idx + 1 < len(argv):\n"
                  "            value = argv[idx + 1]\n"
                  "            del argv[idx:idx + 2]\n"
                  "            argv.insert(0, value)\n"
                  "            argv.insert(0, '--bazelArguments')\n"
                  "    else:\n"
                  "        for i, a in enumerate(argv):\n"
                  "            if a.startswith('--bazelArguments='):\n"
                  "                del argv[i]\n"
                  "                argv.insert(0, a)\n"
                  "                break\n"
                  "\n"
                  "    args = parser.parse_args(argv)\n"
              )
          
          # 2) If provisioning profiles are disabled, don't require aps-environment
          needle = (
              "    if codesigning_data.aps_environment is None:\n"
              "        print('Could not find a valid aps-environment entitlement in the provided provisioning profiles')\n"
              "        sys.exit(1)\n"
          )
          if needle in s:
              s = s.replace(
                  needle,
                  "    if codesigning_data.aps_environment is None:\n"
                  "        # When provisioning profiles are explicitly disabled (e.g. simulator-only or unsigned builds),\n"
                  "        # we can proceed without APNs entitlements.\n"
                  "        disable_profiles = getattr(arguments, 'disableProvisioningProfiles', False)\n"
                  "        if getattr(arguments, 'bazelArguments', None):\n"
                  "            disable_profiles = disable_profiles or ('--//Telegram:disableProvisioningProfiles' in str(arguments.bazelArguments))\n"
                  "        if disable_profiles:\n"
                  "            codesigning_data.aps_environment = \"\"\n"
                  "        else:\n"
                  "            print('Could not find a valid aps-environment entitlement in the provided provisioning profiles')\n"
                  "            sys.exit(1)\n"
              )

          # 3) When provisioning profiles are disabled, still export placeholder targets so Bazel rules
          # that reference @build_configuration//provisioning:*.mobileprovision don't fail analysis.
          if "provisioning_profile_files = []" in s and "PLACEHOLDER_PROFILES_FOR_DISABLED_PROVISIONING" not in s:
              s = s.replace(
                  "    provisioning_profile_files = []\n"
                  "    for file_name in os.listdir(provisioning_path):\n"
                  "        if file_name.endswith('.mobileprovision'):\n"
                  "            provisioning_profile_files.append(file_name)\n",
                  "    provisioning_profile_files = []\n"
                  "    for file_name in os.listdir(provisioning_path):\n"
                  "        if file_name.endswith('.mobileprovision'):\n"
                  "            provisioning_profile_files.append(file_name)\n"
                  "\n"
                  "    # PLACEHOLDER_PROFILES_FOR_DISABLED_PROVISIONING\n"
                  "    disable_profiles = getattr(arguments, 'disableProvisioningProfiles', False)\n"
                  "    if getattr(arguments, 'bazelArguments', None):\n"
                  "        disable_profiles = disable_profiles or ('--//Telegram:disableProvisioningProfiles' in str(arguments.bazelArguments))\n"
                  "    if disable_profiles:\n"
                  "        required = [\n"
                  "            'Telegram.mobileprovision',\n"
                  "            'Share.mobileprovision',\n"
                  "            'NotificationContent.mobileprovision',\n"
                  "            'Widget.mobileprovision',\n"
                  "            'Intents.mobileprovision',\n"
                  "            'BroadcastUpload.mobileprovision',\n"
                  "            'NotificationService.mobileprovision',\n"
                  "        ]\n"
                  "        for name in required:\n"
                  "            path = provisioning_path + '/' + name\n"
                  "            if not os.path.exists(path):\n"
                  "                with open(path, 'wb') as f:\n"
                  "                    f.write(b'')\n"
                  "                provisioning_profile_files.append(name)\n"
              )
          
          p.write_text(s, encoding="utf-8")
          print(f"Patched {p}")
          PY

      - name: Patch ProjectGeneration for disableProvisioningProfiles
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          
          p = Path("telegram-src/build-system/Make/ProjectGeneration.py")
          s = p.read_text(encoding="utf-8")
          
          marker = "        bazel_generate_arguments += ['--//{}:disableStripping'.format(app_target)]"
          if marker in s and "disableProvisioningProfiles" not in s:
              s = s.replace(
                  marker,
                  marker
                  + "\n        if disable_provisioning_profiles:\n"
                  + "            bazel_generate_arguments += ['--//{}:disableProvisioningProfiles'.format(app_target)]"
              )
          
          marker2 = "        project_bazel_arguments += ['--//{}:disableStripping'.format(app_target)]"
          if marker2 in s and "disableProvisioningProfiles'.format(app_target)]" not in s:
              s = s.replace(
                  marker2,
                  marker2
                  + "\n        if disable_provisioning_profiles:\n"
                  + "            project_bazel_arguments += ['--//{}:disableProvisioningProfiles'.format(app_target)]"
              )
          
          p.write_text(s, encoding="utf-8")
          print(f"Patched {p}")
          PY

      - name: Apply LARP patch
        run: |
          set -euxo pipefail
          cd telegram-src
          # Patch can legitimately be empty / not matching the current upstream snapshot.
          # For TrollStore builds we prefer continuing the build over failing here.
          python3 - <<'PY'
          from pathlib import Path
          src = Path("../larp.patch")
          dst = Path("../larp.patch.lf")
          data = src.read_bytes()
          dst.write_bytes(data.replace(b"\r\n", b"\n"))
          PY
          if git apply --verbose --3way --allow-empty ../larp.patch.lf; then
            echo "LARP patch applied."
          else
            echo "WARNING: LARP patch did not apply (continuing)." 1>&2
          fi

      - name: Create config
        run: |
          set -euxo pipefail
          cd telegram-src
          BUNDLE_ID="${{ secrets.BUNDLE_ID }}"
          if [ -z "$BUNDLE_ID" ]; then BUNDLE_ID="org.telegram.build"; fi
          API_ID="${{ secrets.API_ID }}"
          if [ -z "$API_ID" ]; then API_ID="0"; fi
          API_HASH="${{ secrets.API_HASH }}"
          if [ -z "$API_HASH" ]; then API_HASH="placeholder"; fi
          TEAM_ID="${{ secrets.TEAM_ID }}"
          
          cat > build-config.json << CONFIG
          {
            "bundle_id": "$BUNDLE_ID",
            "api_id": "$API_ID",
            "api_hash": "$API_HASH",
            "team_id": "$TEAM_ID",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          CONFIG

      - name: Generate Xcode project
        run: |
          echo "Skipping generateProject (not needed for IPA build)."

      - name: Import fake codesigning certificates
        run: |
          set -euxo pipefail
          cd telegram-src
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

      - name: Build (device arm64 - unsigned IPA for TrollStore)
        run: |
          set -euxo pipefail
          cd telegram-src
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --bazelArguments="--//Telegram:disableProvisioningProfiles" \
            build \
            --configurationPath=build-config.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --buildNumber=100001 \
            --configuration=release_arm64

      - name: Collect artifacts
        run: |
          set -euxo pipefail
          cd telegram-src
          mkdir -p build/artifacts
          found_ipa=0
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            if [ -f "$f" ]; then
              cp "$f" build/artifacts/
              found_ipa=1
            fi
          done
          if [ "$found_ipa" -ne 1 ]; then
            echo "ERROR: Telegram.ipa not found. Dumping likely output paths:" 1>&2
            ls -la bazel-bin/Telegram || true
            ls -la bazel-out || true
            ls -la bazel-out/* || true
            ls -la bazel-out/applebin_ios-* || true
            ls -la bazel-out/applebin_ios-*/bin/Telegram || true
            exit 1
          fi
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            mkdir -p build/DSYMs
            cp -R "$f" build/DSYMs/
          done
          if [ -d build/DSYMs ]; then
            zip -r "./build/artifacts/Telegram.DSYMs.zip" build/DSYMs 1>/dev/null
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-build
          path: |
            telegram-src/build/artifacts/Telegram.ipa
            telegram-src/build/artifacts/Telegram.DSYMs.zip
          if-no-files-found: warn
