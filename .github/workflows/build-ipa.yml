name: Build Telegram IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clone Telegram-iOS
        run: |
          git clone --recursive -j8 https://github.com/TelegramMessenger/Telegram-iOS.git telegram-src
          cd telegram-src
          git -c submodule.recurse=false checkout 7504a0f92694a3ccbb544e05f97304f8d0891ba9
          cd ..

      - name: Fix patch line endings
        run: tr -d '\r' < larp.patch > larp.patch.lf && mv larp.patch.lf larp.patch

      - name: Apply LARP patch
        run: |
          cd telegram-src
          git apply -p0 --verbose ../larp.patch

      - name: Set Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Create config
        working-directory: telegram-src
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: |
          python3 -c "
          import json, os
          c = {
            'bundle_id': 'org.telegram.build',
            'api_id': os.environ.get('API_ID', '0'),
            'api_hash': os.environ.get('API_HASH', 'placeholder'),
            'team_id': '',
            'app_center_id': '0',
            'is_internal_build': 'true',
            'is_appstore_build': 'false',
            'appstore_id': '0',
            'app_specific_url_scheme': 'tg',
            'premium_iap_product_id': '',
            'enable_siri': False,
            'enable_icloud': False
          }
          with open('build-config.json','w') as f: json.dump(c,f,indent=2)
          "
          cat build-config.json

      - name: Generate Xcode project
        working-directory: telegram-src
        run: |
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            generateProject \
            --configurationPath=build-config.json \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles

      - name: Build (simulateur)
        working-directory: telegram-src
        run: |
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            build \
            --configurationPath=build-config.json \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles \
            --buildNumber=100001 \
            --configuration=release_sim_arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-build
          path: |
            telegram-src/bazel-bin/Telegram/Telegram.app
            telegram-src/bazel-bin/Telegram/Telegram.ipa
          if-no-files-found: warn
